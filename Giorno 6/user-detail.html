<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio Utente — User Directory</title>
</head>

<body>

  <header>
    <h1>User Directory</h1>
    <nav>
      <a href="index.html">&larr; Torna alla lista</a>
    </nav>
  </header>

  <main>

    <section id="user-detail">
      <h2>Dettaglio Utente</h2>

      <div id="user-profile-header">
        <img
          src="https://via.placeholder.com/120"
          alt="Foto profilo di Mario Rossi"
          width="120"
          height="120"
        />
        <div>
          <h3 id="user-name">Mario Rossi</h3>
          <p id="user-role">Amministratore</p>
        </div>
      </div>

      <section id="user-contact">
        <h4>Contatti</h4>
        <dl>
          <dt>Email</dt>
          <dd><a href="mailto:mario.rossi@email.com">mario.rossi@email.com</a></dd>

          <dt>Telefono</dt>
          <dd><a href="tel:+390612345678">+39 06 1234 5678</a></dd>

          <dt>Città</dt>
          <dd>Roma, Italia</dd>
        </dl>
      </section>

      <section id="user-account">
        <h4>Account</h4>
        <dl>
          <dt>ID utente</dt>
          <dd>1</dd>

          <dt>Stato</dt>
          <dd>Attivo</dd>

          <dt>Data registrazione</dt>
          <dd><time datetime="2024-01-15">15 gennaio 2024</time></dd>

          <dt>Ultimo accesso</dt>
          <dd><time datetime="2025-06-01">1 giugno 2025</time></dd>
        </dl>
      </section>

      <div id="user-actions">
        <a href="index.html">&larr; Torna alla lista</a>
        <!-- I seguenti pulsanti saranno collegati a JS nelle prossime lezioni -->
        <button type="button">Modifica</button>
        <button type="button">Elimina</button>
      </div>

    </section>

  </main>

</body>
</html>
